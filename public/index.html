<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tennis Network — SPA</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- NAV -->
<nav class="navbar navbar-expand-lg tennis-nav px-3">
  <a class="navbar-brand" id="logoBtn">🎾 Tennis Network</a>
  <div class="ms-auto d-flex gap-2">
    <button id="btnLogin" class="btn btn-outline-light">Login</button>
    <button id="btnSignup" class="btn btn-light">Sign Up</button>
    <button id="btnMessages" class="btn btn-outline-light ms-2 d-none">Messages</button>
    <button id="btnLogout" class="btn btn-danger d-none">Logout</button>
  </div>
</nav>

<!-- LANDING -->
<div id="landingPage" class="landing-container">
  <div class="landing-content text-center">
    <h1 class="landing-title">The Tennis Network</h1>
    <p class="landing-subtitle">Connect & Play with the tennis world.</p>
    <div class="mt-4">
      <button id="heroSignup" class="btn btn-warning btn-lg">Get Started</button>
    </div>
  </div>
</div>

<!-- MAIN (hidden until login) -->
<div id="mainPage" class="main-layout" style="display:none;">

  <!-- LEFT SIDEBAR -->
  <aside class="profile-box shadow-lg">
    <div class="d-flex justify-content-between align-items-start">
      <h4>🏅 Profile</h4>
      <button id="editProfileBtn" class="btn btn-sm btn-outline-secondary">Edit</button>
    </div>

    <p><strong>Name:</strong> <span id="profileName">—</span></p>
    <p><strong>Email:</strong> <span id="profileEmail">—</span></p>

    <!-- Weather Box -->
    <div id="weatherBox" class="weather-box mt-2 p-2">
      <h5>🌤 Weather</h5>
      <p id="weatherInfo">Loading...</p>
    </div>

    <button id="btnTennisGPT" class="btn btn-info w-100 mt-2">TennisGPT</button>

  </aside>

  <!-- CONTENT AREA -->
  <div class="content-area">
    <div id="mainFeed">
  <!-- TOP: search + composer -->
  <div class="d-flex gap-3 mb-3 align-items-start">

    <!-- Search -->
    <div style="flex:1">
      <input id="searchInput" class="form-control search-bar" placeholder="Search posts or players…" />
      <div id="searchResults" class="mt-2"></div>
    </div>

    <!-- Composer -->
    <div class="composer-card p-3 tennis-card" style="width:340px;">
      <h6>Create Post</h6>
      <textarea id="postText" class="form-control mb-2" rows="3" placeholder="Share a training tip or match story..."></textarea>
      <input id="postFile" type="file" class="form-control mb-2" />
      <div class="d-flex gap-2">
        <button id="btnPost" class="btn btn-success">Post</button>
        <button id="btnPostWithFile" class="btn btn-outline-primary">Post + Upload</button>
        <button id="btnMyPosts" class="btn btn-primary">My Posts</button>
      </div>
    </div>

  </div>

  <!-- FEED -->
  <h2 class="section-title">🎾 Home Feed</h2>
  <div id="content" class="mt-3"></div>
</div>

<!-- Messages page outside feed -->
<div id="messagesPage" style="display:none; padding:20px;">
  <button id="backToFeed" class="btn btn-secondary mb-2">Back to Feed</button>
  <h2>Your Messages</h2>
  <div style="display:flex; gap:20px;">
    <!-- LEFT: conversation list -->
    <div style="width:200px;">
      <h4>Conversations</h4>
      <ul id="conversationList"></ul>
    </div>
    <!-- RIGHT: chat window -->
    <div style="flex:1;">
      <h4 id="chatWith"></h4>
      <div id="chatMessages" style="border:1px solid #ccc; height:300px; overflow-y:auto; padding:10px;"></div>
      <textarea id="chatInput" class="form-control mt-2"></textarea>
      <button id="chatSendBtn" class="btn btn-primary mt-2">Send</button>
    </div>
  </div>
</div>

</div>

    </div>

  </div>
</div>

<!-- AUTH MODAL -->
<div class="modal fade" id="authModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5 id="authTitle" class="modal-title">Login</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <!-- signup -->
        <div id="signupFields" style="display:none;">
          <div class="mb-3"><label>Name</label><input id="signupName" class="form-control"></div>
          <div class="mb-3"><label>Email</label><input id="signupEmail" type="email" class="form-control"></div>
          <div class="mb-3"><label>Password</label><input id="signupPassword" type="password" class="form-control"></div>
        </div>

        <!-- login -->
        <div id="loginFields">
          <div class="mb-3"><label>Email</label><input id="loginEmail" type="email" class="form-control"></div>
          <div class="mb-3"><label>Password</label><input id="loginPassword" type="password" class="form-control"></div>
        </div>
      </div>

      <div class="modal-footer">
        <button id="authBtn" class="btn btn-success w-100">Login</button>
      </div>

    </div>
  </div>
</div>

<!-- PROFILE EDIT MODAL -->
<div class="modal fade" id="profileEditModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>Edit Profile</h5>
      <div class="mb-2"><label>Name</label><input id="editName" class="form-control"></div>
      <div class="mb-2"><label>New Password</label><input id="editPassword" type="password" class="form-control"></div>
      <div class="d-flex gap-2 justify-content-end"><button id="saveProfileBtn" class="btn btn-primary">Save</button></div>
    </div>
  </div>
</div>

<!-- MESSAGES MODAL (simple prompt-style will also be used) -->
<div class="modal fade" id="messagesModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content p-3">
      <h5>Messages</h5>
      <div id="messagesList" style="height:400px; overflow:auto; border:1px solid #eee; padding:10px;"></div>
      <div class="d-flex gap-2 mt-2">
        <input id="messageTo" placeholder="To (email)" class="form-control" />
        <input id="messageText" placeholder="Message" class="form-control" />
        <button id="sendMessageBtn" class="btn btn-primary">Send</button>
      </div>
    </div>
  </div>
</div>

<!-- TennisGPT Modal -->
<div id="tennisGPTModal" class="modal fade" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content p-3">
      <h5>TennisGPT</h5>
      <textarea id="tennisGPTQuestion" class="form-control" placeholder="Ask a tennis question..."></textarea>
      <button id="tennisGPTAskBtn" class="btn btn-primary mt-2">Ask</button>
      <div id="tennisGPTAnswer" class="mt-2"></div>
    </div>
  </div>
</div>

<!--This is the floating comment modal for users to enter comments-->
<div class="modal fade" id="commentModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add a Comment</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <textarea id="commentInput" class="form-control" rows="3" placeholder="Write a comment..."></textarea>
      </div>
      <div class="modal-footer">
        <button type="button" id="submitComment" class="btn btn-primary">Post Comment</button>
      </div>
    </div>
  </div>
</div>


<!-- BOOTSTRAP JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- app JS -->
<script src="main.js"></script>
</body>
</html>
